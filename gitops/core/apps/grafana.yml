apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  project: default
  # Common helm-chart drift patterns (mirrors loki.yml + garage.yml):
  # - Secret data: chart re-randomizes admin-password on each render
  # - Deployment template annotations: chart computes checksum/config etc.
  # - PVC labels: chart adds helm labels at create-time, kube-controller-manager
  #   then takes ownership, ArgoCD re-render drifts
  ignoreDifferences:
  - group: ""
    kind: Secret
    name: grafana
    jsonPointers:
    - /data
  - group: apps
    kind: Deployment
    jsonPointers:
    - /spec/template/metadata/annotations
  - group: ""
    kind: PersistentVolumeClaim
    jsonPointers:
    - /metadata/labels
    - /metadata/annotations
  source:
    chart: grafana
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: 8.10.4
    helm:
      values: |
        grafana.ini:
          analytics:
            check_for_updates: true
          grafana_net:
            url: https://grafana.net
          log:
            mode: console
          paths:
            data: /var/lib/grafana/
            logs: /var/log/grafana
            plugins: /var/lib/grafana/plugins
            provisioning: /etc/grafana/provisioning
          server:
            domain: monitoring.phillips-homelab.net
            root_url: https://monitoring.phillips-homelab.net
        grafanaAgent:
          logLevel: warn
        ingress:
          enabled: false
        persistence:
          type: pvc
          enabled: true
          size: 5Gi
        sidecar:
          dashboards:
            enabled: true
            label: grafana_dashboard
            labelValue: true
  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true
