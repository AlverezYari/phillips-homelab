apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
spec:
  project: default
  source:
    path: gitops/core/apps/argocd
    repoURL: 'https://github.com/AlverezYari/phillips-homelab.git'
    targetRevision: main
  destination:
    namespace: argocd
    server: 'https://kubernetes.default.svc'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      # Required when Argo CD manages itself, per v3.2 -> v3.3 upgrade notes:
      # ApplicationSet CRD exceeds the 262KB client-side-apply annotation limit.
      - ServerSideApply=true
