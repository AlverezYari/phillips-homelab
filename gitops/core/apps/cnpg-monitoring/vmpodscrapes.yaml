apiVersion: operator.victoriametrics.com/v1beta1
kind: VMPodScrape
metadata:
  name: cnpg-operator
  namespace: cnpg-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudnative-pg
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 30s
---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMPodScrape
metadata:
  name: cnpg-barman-plugin
  namespace: cnpg-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: plugin-barman-cloud
  podMetricsEndpoints:
    - targetPort: 9090
      path: /metrics
      interval: 30s
