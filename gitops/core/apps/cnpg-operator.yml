apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg-operator
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-system
  project: default
  source:
    repoURL: https://cloudnative-pg.github.io/charts
    chart: cloudnative-pg
    targetRevision: "0.28.0"
    helm:
      values: |
        # podMonitorEnabled is off — cluster uses VictoriaMetrics native CRDs,
        # not prometheus-operator PodMonitor. Scraping is wired separately
        # via VMPodScrape resources.
        config:
          data:
            INHERITED_ANNOTATIONS: "categories"
            INHERITED_LABELS: "environment,workload,team"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ServerSideDiff=false
