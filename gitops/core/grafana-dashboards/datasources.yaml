apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
  labels:
    grafana_datasource: "true"
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://vmsingle-vmstack:8429
        access: proxy
        isDefault: true
        editable: false
      - name: Loki
        type: loki
        uid: loki
        url: http://loki-gateway:80
        access: proxy
        editable: false
        # Vector ships logs with tenant_id "1"; without the matching
        # X-Scope-OrgID header every query returns "no org id".
        jsonData:
          maxLines: 1000
          httpHeaderName1: X-Scope-OrgID
        secureJsonData:
          httpHeaderValue1: "1"
      - name: Tempo
        type: tempo
        uid: tempo
        url: http://tempo.monitoring.svc:3200
        access: proxy
        editable: false
        jsonData:
          nodeGraph:
            enabled: true
          serviceMap:
            datasourceUid: prometheus
