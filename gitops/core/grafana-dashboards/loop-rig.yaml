apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-loop-rig
  namespace: monitoring
  labels:
    grafana_dashboard: "true"
data:
  loop-rig.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "tags": [
        "loops"
      ],
      "title": "Loop Rig Fleet",
      "uid": "loop-rig-fleet",
      "timezone": "browser",
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "refresh": "1m",
      "schemaVersion": 39,
      "templating": {
        "list": [
          {
            "name": "loop",
            "label": "Loop",
            "type": "query",
            "datasource": {
              "type": "loki",
              "uid": "loki"
            },
            "query": "label_values({namespace=\"loops\"}, pod)",
            "refresh": 2,
            "includeAll": true,
            "allValue": ".+",
            "multi": false,
            "current": {
              "text": "All",
              "value": "$__all"
            }
          }
        ]
      },
      "panels": [
        {
          "type": "stat",
          "title": "Loops running now",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 0,
            "y": 0
          },
          "targets": [
            {
              "expr": "count(kube_pod_container_status_running{namespace=\"loops\", container=\"loop\"} == 1) or vector(0)",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "text",
                    "value": null
                  }
                ]
              }
            }
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            }
          }
        },
        {
          "type": "bargauge",
          "title": "Iteration budget used (per loop)",
          "description": "iteration N / budget M, from harness log lines (=== iteration N/M ===). 100% = loop is on its final funded iteration. Yellow from 80%: reap or expect .loop-done/.loop-blocked soon. Reaped loops age out within ~2h. Filter with the Loop picker above.",
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "gridPos": {
            "h": 4,
            "w": 10,
            "x": 4,
            "y": 0
          },
          "targets": [
            {
              "expr": "max by (pod) (last_over_time({namespace=\"loops\", pod=~\"$loop\"} |= \"=== iteration\" | regexp `iteration (?P<iter>[0-9]+)/(?P<budget>[0-9]+)` | unwrap iter [$__range])) / max by (pod) (last_over_time({namespace=\"loops\", pod=~\"$loop\"} |= \"=== iteration\" | regexp `iteration (?P<iter>[0-9]+)/(?P<budget>[0-9]+)` | unwrap budget [$__range]))",
              "refId": "A",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "decimals": 0,
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "blue",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 0.8
                  },
                  {
                    "color": "red",
                    "value": 0.95
                  }
                ]
              }
            }
          },
          "options": {
            "orientation": "horizontal",
            "displayMode": "gradient",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "showUnfilled": true
          },
          "timeFrom": "2h"
        },
        {
          "type": "stat",
          "title": "Loop CPU (live)",
          "description": "Actual CPU burn of loop containers right now. Each loop may burst to 4 cores; mostly idles while waiting on the Claude API.",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 5,
            "x": 14,
            "y": 0
          },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"loops\", container=\"loop\"}[5m])) or vector(0)",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "cores",
              "decimals": 2,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "text",
                    "value": null
                  }
                ]
              }
            }
          },
          "options": {
            "colorMode": "none",
            "graphMode": "area",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            }
          }
        },
        {
          "type": "stat",
          "title": "Loop memory (live)",
          "description": "Actual working-set memory of loop containers right now (limit 6Gi per loop).",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 5,
            "x": 19,
            "y": 0
          },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"loops\", container=\"loop\"}) or vector(0)",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "decimals": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "text",
                    "value": null
                  }
                ]
              }
            }
          },
          "options": {
            "colorMode": "none",
            "graphMode": "area",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            }
          }
        },
        {
          "type": "logs",
          "title": "Harness events (iterations, gates, state)",
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "gridPos": {
            "h": 10,
            "w": 12,
            "x": 0,
            "y": 4
          },
          "targets": [
            {
              "expr": "{namespace=\"loops\", pod=~\"$loop\"} |= \"[harness\" | json | line_format \"{{.pod_name}} | {{.message}}\"",
              "refId": "A",
              "maxLines": 200
            }
          ],
          "options": {
            "showTime": true,
            "wrapLogMessage": true,
            "sortOrder": "Descending",
            "dedupStrategy": "none",
            "enableLogDetails": true
          },
          "timeFrom": "1h"
        },
        {
          "type": "logs",
          "title": "Needs attention (gate RED, failures, rate limits, blocks, decisions)",
          "description": "Anything here means the rig wants an operator: red gates, crashes, rate limits, BLOCKED items, decisions filed, or answers arriving.",
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "gridPos": {
            "h": 10,
            "w": 12,
            "x": 12,
            "y": 4
          },
          "targets": [
            {
              "expr": "{namespace=\"loops\", pod=~\"$loop\"} |~ \"gate RED|FAILED|fatal|rate limit|WARN|blocked;|relayed decision|operator answer\" | json | line_format \"{{.pod_name}} | {{.message}}\"",
              "refId": "A",
              "maxLines": 200
            }
          ],
          "options": {
            "showTime": true,
            "wrapLogMessage": true,
            "sortOrder": "Descending",
            "dedupStrategy": "none",
            "enableLogDetails": true
          },
          "timeFrom": "1h"
        },
        {
          "type": "timeseries",
          "title": "CPU by pod (loops ns)",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 0,
            "y": 14
          },
          "targets": [
            {
              "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"loops\", container!=\"\", pod=~\"$loop\"}[5m]))",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "cores",
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 8,
                "pointSize": 1,
                "showPoints": "never"
              },
              "color": {
                "mode": "palette-classic"
              }
            }
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          }
        },
        {
          "type": "timeseries",
          "title": "Memory by pod (loops ns)",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 8,
            "y": 14
          },
          "targets": [
            {
              "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=\"loops\", container!=\"\", pod=~\"$loop\"})",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 8,
                "pointSize": 1,
                "showPoints": "never"
              },
              "color": {
                "mode": "palette-classic"
              }
            }
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          }
        },
        {
          "type": "bargauge",
          "title": "Fleet capacity committed (vs quota)",
          "description": "Reservations (pod requests) against the loops-namespace ResourceQuota — moves when pods are added/removed, NOT with load. Each loop commits 1 CPU / 2Gi / 1 PVC; the NATS+bridge infra floor is ~5%. Live burn is in the panels to the left.",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 16,
            "y": 14
          },
          "targets": [
            {
              "expr": "100 * max(kube_resourcequota{namespace=\"loops\", resource=\"requests.cpu\", type=\"used\"}) / max(kube_resourcequota{namespace=\"loops\", resource=\"requests.cpu\", type=\"hard\"})",
              "refId": "A",
              "instant": true,
              "legendFormat": "CPU reserved"
            },
            {
              "expr": "100 * max(kube_resourcequota{namespace=\"loops\", resource=\"requests.memory\", type=\"used\"}) / max(kube_resourcequota{namespace=\"loops\", resource=\"requests.memory\", type=\"hard\"})",
              "refId": "B",
              "instant": true,
              "legendFormat": "Memory reserved"
            },
            {
              "expr": "100 * (count(kube_persistentvolumeclaim_info{namespace=\"loops\", persistentvolumeclaim=~\"workspace-.+\"}) or vector(0)) / max(kube_resourcequota{namespace=\"loops\", resource=\"persistentvolumeclaims\", type=\"hard\"})",
              "refId": "C",
              "instant": true,
              "legendFormat": "Workspace PVCs"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "decimals": 0,
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 70
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            }
          },
          "options": {
            "orientation": "horizontal",
            "displayMode": "gradient",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "showUnfilled": true
          }
        }
      ],
      "timepicker": {
        "refresh_intervals": [
          "1m",
          "5m",
          "15m",
          "30m",
          "1h"
        ]
      }
    }
