apiVersion: v1
kind: ConfigMap
metadata:
  name: glance-config
  namespace: glance
data:
  glance.yml: |
    server:
      port: 8080
      host: 0.0.0.0

    theme:
      background-color: 240 8 9
      primary-color: 43 50 70
      contrast-multiplier: 1.1

    pages:
      - name: Home
        columns:
          - size: small
            widgets:
              - type: clock
                hour-format: 12h

              - type: monitor
                cache: 5m
                title: Homelab Services
                sites:
                  - title: ArgoCD
                    url: https://argocd.phillips-homelab.net
                  - title: Grafana
                    url: https://monitoring.phillips-homelab.net
                  - title: Omni
                    url: https://phillips-homelab.omni.siderolabs.io/
                  - title: Blocky
                    url: https://blocky.phillips-homelab.net
                  - title: Home Assistant
                    url: https://home-assistant.phillips-homelab.net
                  - title: Jellyfin
                    url: https://jellyfin.phillips-homelab.net
                  - title: Files
                    url: https://files.phillips-homelab.net
                  - title: OpenWebUI
                    url: https://openwebui.phillips-homelab.net

              - type: weather
                location: Vestavia Hills, Alabama, United States
                units: imperial
                hour-format: 12h

          - size: full
            widgets:
              - type: bookmarks
                groups:
                  - title: Infra
                    links:
                      - title: ArgoCD
                        url: https://argocd.phillips-homelab.net
                      - title: Monitoring
                        url: https://monitoring.phillips-homelab.net
                      - title: Omni Portal
                        url: https://phillips-homelab.omni.siderolabs.io/
                      - title: Blocky
                        url: https://blocky.phillips-homelab.net
                  - title: Apps
                    links:
                      - title: Home Assistant
                        url: https://home-assistant.phillips-homelab.net
                      - title: Jellyfin
                        url: https://jellyfin.phillips-homelab.net
                      - title: Files
                        url: https://files.phillips-homelab.net
                      - title: OpenWebUI
                        url: https://openwebui.phillips-homelab.net

              - type: hacker-news
                limit: 15
                collapse-after: 6

              - type: lobsters
                sort-by: hot
                limit: 15
                collapse-after: 6

              - type: reddit
                subreddit: homelab
                limit: 10
                collapse-after: 5

              - type: reddit
                subreddit: selfhosted
                limit: 10
                collapse-after: 5

          - size: small
            widgets:
              - type: calendar

              - type: releases
                cache: 1d
                repositories:
                  - glanceapp/glance
                  - argoproj/argo-cd
                  - 0xerr0r/blocky
                  - cilium/cilium
                  - siderolabs/talos
                  - kubernetes/kubernetes
