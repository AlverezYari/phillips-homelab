# FanDuel game-lines ingest CronJob.
#
# FanDuel's sbapi is geo-fenced to licensed states, so this job egresses
# through a Tailscale exit box in Chicago. Egress is handled by the
# Tailscale OPERATOR, not an in-pod sidecar: the `fanduel-egress`
# ExternalName Service (see egress-fanduel.yaml) forwards cluster TCP to
# the box's tailnet IP, where a microsocks SOCKS5 daemon listens on
# :1055. The feed FanDuel client uses that Service as its SOCKS5 proxy
# (FANDUEL_SOCKS5), so only FanDuel traffic takes the Chicago path;
# Postgres and the other sources dial direct.
#
# Because there's no sidecar, this is a plain single-container Job — it
# logs to Loki exactly like the pinnacle/novig/polymarket ingests, so
# runs are observable. FanDuel is a primary source (full event identity
# in the page), so no ordering dependency on the pinnacle chain.
#
# concurrencyPolicy: Forbid + idempotent writes (UPSERT event,
# append-only line) make a missed or overlapping tick self-heal.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: tipoff-ingest-fanduel
  labels:
    app.kubernetes.io/name: tipoff-ingest-fanduel
    app.kubernetes.io/component: ingest
    tipoff.io/source: fanduel
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 60
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 240
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: tipoff-ingest-fanduel
            tipoff.io/source: fanduel
        spec:
          restartPolicy: OnFailure
          containers:
            - name: feed
              image: tipoff # rewritten by kustomization.yaml
              args: ["ingest", "fanduel"]
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: tipoff-pg-app
                      key: uri
                - name: LOG_LEVEL
                  value: info
                - name: FANDUEL_SOCKS5
                  # Operator egress Service → Chicago box's microsocks.
                  value: "fanduel-egress.tipoff.svc.cluster.local:1055"
              resources:
                requests:
                  cpu: 25m
                  memory: 32Mi
                limits:
                  cpu: 500m
                  memory: 128Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 65532 # distroless `nonroot` UID
                runAsGroup: 65532
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
