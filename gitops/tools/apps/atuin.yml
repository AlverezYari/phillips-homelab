apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: atuin
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: atuin
  project: default
  # CNPG operator and ESO webhook apply server-side defaults that aren't
  # worth declaring in our manifest. Filter out fields owned by their
  # field managers — cleaner than enumerating every defaulted path.
  ignoreDifferences:
  - group: postgresql.cnpg.io
    kind: Cluster
    managedFieldsManagers:
    - manager
  - group: external-secrets.io
    kind: ExternalSecret
    jsonPointers:
    - /spec/refreshInterval
    - /spec/target/deletionPolicy
    - /spec/data
  source:
    path: gitops/tools/apps/atuin
    repoURL: https://github.com/AlverezYari/phillips-homelab.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ServerSideDiff=true
