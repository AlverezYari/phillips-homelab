apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tipoff
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # After tipoff-db (wave 0) so the CNPG cluster + tipoff-pg-app secret
    # exist before the migrate hook and workloads run.
    argocd.argoproj.io/sync-wave: "1"
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: tipoff
  project: default
  source:
    path: gitops/tools/apps/tipoff
    repoURL: https://github.com/AlverezYari/phillips-homelab.git
    targetRevision: main
  # The Tailscale operator rewrites the fanduel-egress Service's
  # spec.externalName to its proxy address after we create it. Without
  # this, selfHeal would revert it to the placeholder every sync and
  # break FanDuel egress. RespectIgnoreDifferences makes the sync apply
  # honor the ignore (not just the diff view). See
  # apps/tipoff/egress-fanduel.yaml.
  ignoreDifferences:
    - group: ""
      kind: Service
      name: fanduel-egress
      namespace: tipoff
      jsonPointers:
        - /spec/externalName
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ServerSideDiff=true
      - RespectIgnoreDifferences=true
