apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stock-bot
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # After stock-bot-db (wave 0) so the CNPG cluster + stock-bot-pg-app
    # secret exist before the migrate hook and workloads run.
    argocd.argoproj.io/sync-wave: "1"
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: stock-bot
  project: default
  source:
    path: gitops/tools/apps/stock-bot
    repoURL: https://github.com/AlverezYari/phillips-homelab.git
    targetRevision: main
  # ESO mutates ExternalSecrets post-admission (defaults on data/refreshInterval/
  # deletionPolicy). With ServerSideApply that drift made Argo try to force-replace
  # them — "--force cannot be used with --server-side" — wedging the sync. Ignore
  # those fields (matches the synology-csi app's ESO handling).
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jsonPointers:
        - /spec/refreshInterval
        - /spec/target/deletionPolicy
        - /spec/data
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ServerSideDiff=true
      - RespectIgnoreDifferences=true
