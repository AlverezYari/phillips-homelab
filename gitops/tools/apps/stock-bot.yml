apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stock-bot
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # After stock-bot-db (wave 0) so the CNPG cluster + stock-bot-pg-app
    # secret exist before the migrate hook and workloads run.
    argocd.argoproj.io/sync-wave: "1"
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: stock-bot
  project: default
  source:
    path: gitops/tools/apps/stock-bot
    repoURL: https://github.com/AlverezYari/phillips-homelab.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ServerSideDiff=true
      - RespectIgnoreDifferences=true
