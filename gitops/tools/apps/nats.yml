apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nats
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: loops
  project: default
  source:
    chart: nats
    repoURL: https://nats-io.github.io/k8s/helm/charts/
    targetRevision: 1.3.16
    helm:
      values: |
        config:
          jetstream:
            enabled: true
            fileStore:
              pvc:
                enabled: true
                size: 5Gi
                storageClassName: nvme-scratch
          merge:
            authorization:
              users:
                - user: loop
                  password: << $NATS_PASSWORD >>
        container:
          env:
            NATS_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: loop-secrets
                  key: NATS_PASSWORD
          merge:
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
        podTemplate:
          merge:
            spec:
              nodeSelector:
                kubernetes.io/hostname: homelab-04
        natsBox:
          enabled: true
          container:
            env:
              NATS_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: loop-secrets
                    key: NATS_PASSWORD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
