# Streamlit dashboard Deployment — the "material feed" consumption view.
#
# Read-only over Postgres (opens a read-only session; SELECT-only queries).
# Uses the same stock-bot-pg-app secret as serve; a dedicated read-only role
# is a later hardening step.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock-bot-dash
  labels:
    app.kubernetes.io/name: stock-bot-dash
    app.kubernetes.io/component: dashboard
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: stock-bot-dash
  template:
    metadata:
      labels:
        app.kubernetes.io/name: stock-bot-dash
        app.kubernetes.io/component: dashboard
    spec:
      serviceAccountName: stock-bot-dash
      containers:
        - name: dash
          image: stock-bot-dash
          ports:
            - name: http
              containerPort: 8501
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: stock-bot-pg-app
                  key: uri
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          startupProbe:
            httpGet:
              path: /_stcore/health
              port: http
            periodSeconds: 2
            failureThreshold: 45   # 90s for first boot (pip-free, but cold pull)
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          # Streamlit writes config/cache under $HOME (=/tmp); mount it writable
          # so the root filesystem can stay read-only.
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 50m
              memory: 192Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: tmp
          emptyDir: {}
