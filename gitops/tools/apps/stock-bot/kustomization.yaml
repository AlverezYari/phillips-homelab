# stock-bot application workload (the app side; the CNPG database lives
# in the sibling stock-bot-db app). Each command runs the same image with
# a different arg: ingest pulls from upstream data sources on a cron,
# serve exposes the HTTP API.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: stock-bot

resources:
  - migrate-job.yaml
  - cronjob-quotes.yaml
  - cronjob-news.yaml
  - cronjob-edgar.yaml
  - cronjob-triage.yaml
  - cronjob-ipo.yaml
  - cronjob-digest.yaml
  - cronjob-holdings.yaml
  - snaptrade-externalsecret.yaml
  - alpaca-externalsecret.yaml
  - serve-deployment.yaml
  - serve-service.yaml
  - dashboard-deployment.yaml
  - dashboard-service.yaml

# Single point of override for the image tags. Bump newTag to deploy a new
# build; Argo syncs it. (`migrate up` runs as a PreSync hook, so a tag
# carrying new migrations applies them before the workloads roll.)
# The scout image (Go) runs the cronjobs + serve API; stock-bot-dash (Python)
# is the Streamlit dashboard, versioned independently.
images:
  - name: stock-bot
    newName: zot.phillips-homelab.net/stock-bot
    newTag: 829131b
  - name: stock-bot-dash
    newName: zot.phillips-homelab.net/stock-bot-dash
    newTag: f6363a1

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/part-of: stock-bot
      app.kubernetes.io/managed-by: kustomize
