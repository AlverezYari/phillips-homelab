# Holdings ingest CronJob.
#
# Pulls brokerage positions from SnapTrade hourly during US market hours,
# mirrors them into the positions table, and augments the watchlist with held
# tickers (reason 'robinhood') so EDGAR -> triage track what's actually owned.
# Hourly keeps positions + P&L on the dashboard fresh while the market's open.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: stock-bot-holdings
  labels:
    app.kubernetes.io/name: stock-bot-holdings
    app.kubernetes.io/component: ingest
    stock-bot.io/source: holdings
spec:
  schedule: "0 13-21 * * 1-5"   # hourly, ~09:00-17:00 ET, weekdays
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 60
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 240
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: stock-bot-holdings
            stock-bot.io/source: holdings
        spec:
          restartPolicy: OnFailure
          containers:
            - name: feed
              image: stock-bot
              args: ["ingest", "holdings"]
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: stock-bot-pg-app
                      key: uri
                - name: LOG_LEVEL
                  value: info
                - name: SNAPTRADE_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: stock-bot-snaptrade
                      key: client_id
                - name: SNAPTRADE_CONSUMER_KEY
                  valueFrom:
                    secretKeyRef:
                      name: stock-bot-snaptrade
                      key: consumer_key
              resources:
                requests:
                  cpu: 25m
                  memory: 32Mi
                limits:
                  cpu: 500m
                  memory: 128Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 65532
                runAsGroup: 65532
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
