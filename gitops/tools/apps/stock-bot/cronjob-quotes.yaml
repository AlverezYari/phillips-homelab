# Quotes ingest CronJob.
#
# Pulls daily price/volume bars from Alpaca after the US market close,
# weekdays only. APCA_* creds come from the stock-bot-secrets
# ExternalSecret (apps/stock-bot-secrets.yml).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: stock-bot-ingest-quotes
  labels:
    app.kubernetes.io/name: stock-bot-ingest-quotes
    app.kubernetes.io/component: ingest
    stock-bot.io/source: quotes
spec:
  # SUSPENDED: Alpaca creds not yet provisioned (stock-bot-secrets ExternalSecret
  # deferred). Un-suspend once an Alpaca paper API key is in 1Password.
  suspend: true
  schedule: "0 22 * * 1-5"   # 22:00 UTC weekdays — after US market close
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 60
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 240
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: stock-bot-ingest-quotes
            stock-bot.io/source: quotes
        spec:
          restartPolicy: OnFailure
          containers:
            - name: feed
              image: stock-bot
              args: ["ingest", "quotes"]
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: stock-bot-pg-app
                      key: uri
                - name: LOG_LEVEL
                  value: info
                - name: APCA_API_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: stock-bot-secrets
                      key: alpaca_api_key
                - name: APCA_API_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: stock-bot-secrets
                      key: alpaca_secret_key
              resources:
                requests:
                  cpu: 25m
                  memory: 32Mi
                limits:
                  cpu: 500m
                  memory: 128Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 65532
                runAsGroup: 65532
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
