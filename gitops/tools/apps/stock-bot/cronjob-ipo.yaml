# IPO discovery CronJob.
#
# Discovers new S-1/F-1 registrations market-wide via SEC EDGAR full-text
# search and has the LLM flag ones matching IPO_VERTICALS. Uses the cluster
# Ollama (no API-key secret) and EDGAR (needs the descriptive User-Agent).
# Runs once daily — registrations are low-frequency.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: stock-bot-ipo
  labels:
    app.kubernetes.io/name: stock-bot-ipo
    app.kubernetes.io/component: ipo
spec:
  schedule: "0 6 * * *"   # daily at 06:00
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 60
  jobTemplate:
    spec:
      backoffLimit: 1
      # 60 min: screening sends large prospectus prompts to the shared GPU;
      # under contention some calls hit the client timeout, so give the run
      # headroom rather than getting killed mid-screen (was 1800).
      activeDeadlineSeconds: 3600
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: stock-bot-ipo
        spec:
          restartPolicy: OnFailure
          containers:
            - name: ipo
              image: stock-bot
              args: ["ipo"]
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: stock-bot-pg-app
                      key: uri
                - name: LOG_LEVEL
                  value: info
                - name: LLM_BACKEND
                  value: ollama
                - name: LLM_BASE_URL
                  value: http://open-webui-ollama.tools.svc.cluster.local:11434/v1
                - name: TRIAGE_MODEL
                  value: qwen2.5:7b
                # SEC requires a descriptive User-Agent; adjust the contact.
                - name: EDGAR_USER_AGENT
                  value: "stock-bot/0.1 (admin@phillips-homelab.net)"
                # Plain-English interest verticals the LLM screens against.
                - name: IPO_VERTICALS
                  value: "AI infrastructure, gene therapy, defense tech, payments"
              resources:
                requests:
                  cpu: 25m
                  memory: 32Mi
                limits:
                  cpu: 500m
                  memory: 128Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 65532
                runAsGroup: 65532
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
