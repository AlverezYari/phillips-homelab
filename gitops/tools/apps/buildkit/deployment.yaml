apiVersion: apps/v1
kind: Deployment
metadata:
  name: buildkit
  namespace: buildkit
  labels:
    app.kubernetes.io/name: buildkit
    app.kubernetes.io/component: builder
spec:
  replicas: 1
  strategy:
    # Buildkit holds a single-writer PVC; recreate on update so we
    # don't deadlock on the RWO claim.
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: buildkit
  template:
    metadata:
      labels:
        app.kubernetes.io/name: buildkit
    spec:
      nodeSelector:
        kubernetes.io/hostname: homelab-04
      containers:
        - name: buildkit
          image: moby/buildkit:v0.18.1
          args:
            - --addr
            - tcp://0.0.0.0:1234
            - --addr
            - unix:///run/buildkit/buildkitd.sock
          ports:
            - containerPort: 1234
              name: grpc
          securityContext:
            privileged: true
          readinessProbe:
            exec:
              command: ["buildctl", "debug", "workers"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 1234
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "8"
              memory: 16Gi
          volumeMounts:
            - name: cache
              mountPath: /var/lib/buildkit
            - name: run
              mountPath: /run/buildkit
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: buildkit-cache
        - name: run
          emptyDir: {}
