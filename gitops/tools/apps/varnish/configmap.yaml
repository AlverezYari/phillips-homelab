apiVersion: v1
kind: ConfigMap
metadata:
  name: varnish-vcl
  namespace: tatl
  labels:
    app.kubernetes.io/name: varnish
data:
  default.vcl: |
    vcl 4.1;

    backend tatl {
        .host = "tatl.tatl.svc.cluster.local";
        .port = "8080";
        .connect_timeout = 5s;
        # Cold /xx/ pages with multiple LLM chunks can legitimately run
        # 30-60s before tatl writes the first byte. Bumped from 30s so
        # Varnish doesn't 503 a real-but-slow cold translation.
        .first_byte_timeout = 90s;
        .between_bytes_timeout = 30s;
    }

    sub vcl_recv {
        set req.backend_hint = tatl;

        # Auth endpoints: always pass, never touch cookies. Without this,
        # the cookie-strip below kills CSRF on first GET /login, and the
        # Set-Cookie strip in vcl_backend_response can kill the session
        # cookie if Rails ever emits Cache-Control: public on these paths.
        if (req.url ~ "^/(login|session|logout|sign_in|sign_out|users/sign_)") {
            return (pass);
        }

        if (req.http.Cookie ~ "(^|;\s*)(_session|session|auth|token|csrf|logged_in)=") {
            return (pass);
        }

        unset req.http.Cookie;
    }

    sub vcl_backend_response {
        # tatl's cacheControl shim emits "public, max-age=…" on cacheable paths.
        # Strip Set-Cookie so the built-in VCL doesn't mark the response uncacheable
        # (Rails attaches a CSRF Set-Cookie to every response).
        if (beresp.http.Cache-Control ~ "public") {
            unset beresp.http.Set-Cookie;
        }
    }

    sub vcl_deliver {
        if (obj.hits > 0) {
            set resp.http.X-Cache = "HIT";
            set resp.http.X-Cache-Hits = obj.hits;
        } else {
            set resp.http.X-Cache = "MISS";
        }
    }
