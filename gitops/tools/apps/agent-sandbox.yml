apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agent-sandbox
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: agent-sandbox-system
  project: default
  # The controller stamps a ref-hash label on SandboxTemplates it manages
  ignoreDifferences:
  - group: extensions.agents.x-k8s.io
    kind: SandboxTemplate
    jsonPointers:
    - /metadata/labels/agents.x-k8s.io~1sandbox-template-ref-hash
  source:
    path: gitops/tools/apps/agent-sandbox
    repoURL: https://github.com/AlverezYari/phillips-homelab.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # CRDs exceed the 262KB last-applied-configuration annotation limit
      - ServerSideApply=true
      - ServerSideDiff=true
