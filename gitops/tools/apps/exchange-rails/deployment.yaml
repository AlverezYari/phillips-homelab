apiVersion: apps/v1
kind: Deployment
metadata:
  name: exchange-rails
  namespace: tatl
  labels:
    app.kubernetes.io/name: exchange-rails
    app.kubernetes.io/component: origin
spec:
  replicas: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: exchange-rails
  template:
    metadata:
      labels:
        app.kubernetes.io/name: exchange-rails
    spec:
      containers:
        - name: rails
          image: zot.phillips-homelab.net/exchange/rails:dev
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: RAILS_ENV
              value: prod_k8s
            - name: RAILS_LOG_TO_STDOUT
              value: "1"
            - name: RAILS_SERVE_STATIC_FILES
              value: "1"
            # Rails reads ENV["SECRET_KEY_BASE"] (no RAILS_ prefix); naming it
            # RAILS_SECRET_KEY_BASE makes Rails fail boot with "Missing
            # secret_key_base for 'prod_k8s'". Value still comes from the
            # ExternalSecret-backed secret.
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: exchange-rails-secrets
                  key: secret_key_base
            # DATABASE_URL composed from CNPG-published app secret.
            # CNPG creates `exchange-rails-pg-app` with these fields.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: exchange-rails-pg-app
                  key: uri
            # Rails also reads this env var as fallback in database.yml
            - name: QUANTHUB_ON_RAILS_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: exchange-rails-pg-app
                  key: password
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests: { cpu: 500m, memory: 1Gi }
            limits:   { cpu: "2",  memory: 2Gi }
