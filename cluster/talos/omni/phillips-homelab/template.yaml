kind: Cluster
name: phillips-homelab
labels:
  template: true
  cni: none
kubernetes:
  version: v1.35.4
talos:
  version: v1.12.6
features:
  enableWorkloadProxy: true
patches:
  - name: no-cni # disable CNI, we'll install Cilium in our extraManifests
    file: patches/cni.yml
  - name: disable-kubeproxy
    file: patches/disable-kubeproxy.yml
  - name: prep-cluster-for-cilium
    file: patches/extraManifests.yml
  - name: metrics-server
    file: patches/metrics-server.yml
  - name: nameservers
    file: patches/nameservers.yml
---
kind: ControlPlane
machines:
  - 42bf6767-4044-db4b-bf34-98bd8093f5e4
patches:
  - idOverride: 400-phillips-homelab-control-planes-untaint
    inline:
      cluster:
        allowSchedulingOnControlPlanes: true
systemExtensions:
  - siderolabs/amd-ucode
  - siderolabs/iscsi-tools
  - siderolabs/nut-client
  - siderolabs/util-linux-tools
---
kind: Workers
machines:
  - 03000200-0400-0500-0006-000700080009
  - 169b5237-8624-af49-8f83-98bd808f9e04
patches:
  - idOverride: 400-phillips-homelab-workers
    inline:
      machine:
        install:
          disk: /dev/nvme0n1
systemExtensions:
  - siderolabs/amd-ucode
  - siderolabs/iscsi-tools
  - siderolabs/nut-client
  - siderolabs/util-linux-tools
---
kind: Machine
name: 42bf6767-4044-db4b-bf34-98bd8093f5e4
install:
  disk: /dev/nvme0n1
patches:
  - name: nameservers-local
    file: patches/nameservers-local.yml
---
kind: Machine
name: 03000200-0400-0500-0006-000700080009
install:
  disk: /dev/nvme0n1
patches:
  - name: nameservers-local
    file: patches/nameservers-local.yml
---
kind: Workers
name: gpu
machines:
  - 76567b10-4884-4b1d-abc5-345a60522d43
patches:
  - idOverride: 400-phillips-homelab-gpu-workers
    inline:
      machine:
        install:
          disk: /dev/nvme0n1
  - name: nvidia-modules
    file: patches/nvidia-modules.yml
systemExtensions:
  - siderolabs/amd-ucode
  - siderolabs/intel-ice-firmware
  - siderolabs/iscsi-tools
  - siderolabs/nut-client
  - siderolabs/nvidia-container-toolkit-lts
  - siderolabs/nvidia-open-gpu-kernel-modules-lts
  - siderolabs/realtek-firmware
  - siderolabs/util-linux-tools
---
kind: Machine
name: 169b5237-8624-af49-8f83-98bd808f9e04
install:
  disk: /dev/nvme0n1
---
kind: Machine
name: 76567b10-4884-4b1d-abc5-345a60522d43
install:
  disk: /dev/nvme0n1
patches:
  - name: nameservers-local
    file: patches/nameservers-local.yml
  - name: node-ip-fix
    file: patches/node-ip-fix.yml
  - name: nut-client
    file: patches/nut-client.yml
  - idOverride: 500-homelab-04-hostname
    inline:
      machine:
        network:
          hostname: homelab-04

